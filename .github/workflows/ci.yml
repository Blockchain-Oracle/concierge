# CI — TypeScript pipeline.
# Jobs (each a required-status-check candidate for branch protection):
#   lint        — biome check (lint + format check + import sort)
#   typecheck   — tsc -b --noEmit across the 7-project reference graph
#   loc-cap     — defense-in-depth LOC walker against the live tree
#   test-config — runs the enforcement smoke tests (LOC + tsconfig-strict)
#   test        — workspace-wide test runner; matrix expands as @concierge/*
#                 packages with real tests land in story-20+
#   build       — workspace-wide build runner (stub today; real per-package
#                 emit lands per owning story)
#
# Branch protection: rename a job here only if you also update the
# protection rule — renaming silently bypasses the gate.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  PNPM_VERSION: "10"
  NODE_VERSION: "22"

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check

  typecheck:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  loc-cap:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/check-file-loc.mjs

  test-config:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:config

  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Single placeholder shard. Per-package shards activate when
        # @concierge/* packages with real `test` scripts land (story-20+).
        # Example future shape: package: [sdk, shared, providers-aave-v3-mantle, ...]
        package: [_workspace_]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run tests for ${{ matrix.package }}
        run: pnpm -r run test --if-present

  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
