# Security workflow — secret scan + dependency vuln scan + filesystem CVE scan.
# Runs on every push, every PR to main, nightly at 03:00 UTC, and manual dispatch.
# Branch protection: rename a job here only if you also update the protection rule.

name: Security

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GITLEAKS_VERSION: "8.30.1"

jobs:
  gitleaks:
    # Full git-history secret scan. Uses the gitleaks MIT-licensed binary
    # (not the commercial gitleaks-action) to avoid the Gitleaks LLC
    # per-organization license requirement. Same binary version pinned
    # in story-06's pre-commit hook and CONTRIBUTING manual-bump checklist.
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xzf - gitleaks
          chmod +x gitleaks
      - name: Run gitleaks (full history)
        run: ./gitleaks detect --config .gitleaks.toml --redact --no-banner -v

  trivy:
    # Filesystem CVE scan. Exit 1 on CRITICAL/HIGH; fix or document in
    # .trivyignore (with rationale). NEVER silently downgrade exit-code.
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          trivyignores: '.trivyignore'
          ignore-unfixed: 'false'

  osv-scanner:
    # OSV database scan against pnpm-lock.yaml + package.json + Foundry
    # lib/* manifests. TS-native equivalent of Python's pip-audit.
    # google/osv-scanner-action@v2.3.8 (was v1 in spec; v2 is current).
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: google/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --skip-git
            --recursive
            ./
