# Aderyn (Cyfrin's Solidity static analyzer) config.
#
# NOT wired into CI in story-05. Cyfrin doesn't publish an official
# Aderyn GitHub Action; the alternatives (cargo install, manual binary
# download) introduce supply-chain surface area we don't need yet.
# Slither covers the same ground (high-severity static analysis) via
# crytic/slither-action which IS official and Dependabot-tracked.
#
# This file is kept ready so the moment Cyfrin ships an official action
# (or we vendor the binary post-hackathon), one workflow-step bumps the
# integration on. Until then `aderyn --config aderyn.toml` works locally
# for contributors who have aderyn installed (`cargo install aderyn`).

# Root of the Solidity source (relative to this file).
root = "."

# Paths Aderyn should analyze (additive include list).
src = ["src/"]

# Paths Aderyn should skip.
exclude = ["lib/", "out/", "cache/", "broadcast/", "test/"]

# Fail the CLI on HIGH-severity findings. LOW/MEDIUM are advisory.
fail-on-high = true
