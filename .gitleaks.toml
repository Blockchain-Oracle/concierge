# Gitleaks config for Concierge. Extends the upstream default ruleset
# with Concierge-specific secret shapes (provider API keys, Mantle
# Sepolia private keys committed to .env files).

title = "Concierge gitleaks config"

# Inherit upstream default rules (AWS, GCP, GitHub PATs, generic high-
# entropy strings, etc).
[extend]
useDefault = true

# Concierge-specific rules ─────────────────────────────────────────────

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key (sk-ant-...)"
regex = '''sk-ant-[a-zA-Z0-9_-]{80,120}'''
keywords = ["sk-ant-"]

[[rules]]
id = "pimlico-api-key"
description = "Pimlico bundler/paymaster API key (pim_...)"
regex = '''pim_[a-zA-Z0-9]{40,80}'''
keywords = ["pim_"]

[[rules]]
id = "zerodev-project-id"
description = "ZeroDev project ID (UUID inside ZERODEV_PROJECT_ID)"
regex = '''(?i)ZERODEV_PROJECT_ID\s*=\s*["']?[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}["']?'''
keywords = ["zerodev_project_id"]

[[rules]]
id = "pinata-jwt"
description = "Pinata JWT (eyJ... long token in PINATA_JWT)"
regex = '''(?i)PINATA_JWT\s*=\s*["']?eyJ[a-zA-Z0-9_-]{100,}["']?'''
keywords = ["pinata_jwt"]

[[rules]]
id = "privy-app-secret"
description = "Privy app secret (PRIVY_APP_SECRET=)"
regex = '''(?i)PRIVY_APP_SECRET\s*=\s*["']?[a-zA-Z0-9_-]{40,80}["']?'''
keywords = ["privy_app_secret"]

[[rules]]
id = "mantle-private-key-in-env"
description = "0x-prefixed 64-hex private key inside a .env file"
regex = '''(?i)(MANTLE_PRIVATE_KEY|DEPLOYER_PRIVATE_KEY|PRIVATE_KEY)\s*=\s*["']?0x[0-9a-f]{64}["']?'''
path = '''\.env(\.[a-zA-Z]+)?$'''
keywords = ["private_key"]

# Allowlist ────────────────────────────────────────────────────────────

[allowlist]
description = "Paths and patterns gitleaks should NEVER flag"
paths = [
  '''node_modules/''',
  '''pnpm-lock\.yaml''',
  '''\.git/''',
  '''contracts/lib/''',
  '''contracts/out/''',
  '''contracts/cache/''',
  '''contracts/broadcast/''',
  # research/ + archive/ contain audit notes that reference example
  # private-key SHAPES (e.g. "0x..64 hex chars..") but never real keys
  '''research/''',
  '''archive/''',
  # Documentation references (story specs cite expected key shapes)
  '''docs/''',
]
